  <script type="text/javascript">

      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window, document, "clarity", "script", "w2cf1xtz16");

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #0f141a 0%, #0b0f14 100%);
      min-height: 100vh;
      color: #e5e7eb;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: #0f141a;
      border-bottom: 1px solid rgba(255,255,255,0.06);

      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .breadcrumbs .project { font-weight: 400; color: #9ca3af; }
    .breadcrumbs .sep { color: #4b5563; }

    .admin-nav {
      display: flex;
      gap: 6px;
    }

    .admin-nav a {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: background .15s, color .15s, border-color .15s;
    }

    .admin-nav a:hover {
      background: rgba(255,255,255,0.07);
      color: #e5e7eb;
    }

    .admin-nav a.active {
      background: rgba(255,255,255,0.10);
      color: #ffffff;
      border-color: rgba(255,255,255,0.16);
    }

    .heatmap-layout {
      display: flex;
      min-height: calc(100vh - 71px);
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #4b5563;
      padding: 0 8px;
      margin-bottom: 4px;
    }

    .heatmap-main {
      flex: 1;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 16px;

    .admin-switch-btn {
      background: #111;
      color: #fff;
      border: none;

      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 15px;
      transition: 0.2s;
      width: fit-content;
    }

    .admin-switch-btn:hover {
      background: #333;
    }

    .heatmap-frame {
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 480px;
      border: none;
      border-radius: 12px;
      background: #0b0f14;
    }

    .api-panel {
      margin-top: 16px;

    .api-panel-title {
      font-size: 16px;

      margin-bottom: 10px;
    }

    .api-panel-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .api-panel-label {
      font-size: 13px;
      color: #9ca3af;
    }

    .api-panel-select {
      background: #0f141a;
      color: #e5e7eb;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 6px 10px;
    }

    .api-panel button {
      margin-bottom: 0;
    }

    .api-status {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
      min-height: 18px;
    }

    .api-response {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: #d1d5db;
    }

    @media (max-width: 900px) {
      .heatmap-layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .heatmap-main { padding: 18px; }
      .heatmap-frame {
        height: calc(100vh - 250px);
        min-height: 420px;
      }

  </style>
</head>
<body>
<header class="dashboard-header">
  <div class="header-left">
    <div class="breadcrumbs">
      <span class="home">Ольга Турко</span>
      <span class="sep">›</span>
      <span class="project">turko.by</span>
    </div>

    <nav class="admin-nav">
      <a href="/adminka_objects/index.html">Объекты</a>
      <a href="/adminka_objects/tasks.html">Задачи</a>
      <a href="/adminka_objects/heatmap.html" class="active">Heatmap</a>
    </nav>
  </div>
</header>

<div class="heatmap-layout">
  <aside class="sidebar">
    <div class="sidebar-label">Навигация</div>
    <button class="admin-switch-btn" onclick="location.href='/adminka_objects/tasks.html'">
      ← Назад
    </button>
  </aside>

  <main class="heatmap-main">
    <h1>Heatmap / Карты поведения</h1>
    <iframe
      class="heatmap-frame"
      src="https://clarity.microsoft.com/projects/view/w2cf1xtz16"
      style="width:100%; height: calc(100vh - 100px); border: none;"
      title="Microsoft Clarity Heatmap">
    </iframe>

    <section class="api-panel" aria-live="polite">
      <div class="api-panel-title">Проверка API Clarity (Live Insights)</div>
      <div class="api-panel-controls">
        <label class="api-panel-label" for="numOfDaysSelect">numOfDays (оптимально 1):</label>
        <select id="numOfDaysSelect" class="api-panel-select">
          <option value="1" selected>1 день (рекомендуется)</option>
          <option value="2">2 дня</option>
          <option value="3">3 дня</option>
        </select>
        <button id="checkApiBtn" class="admin-switch-btn" type="button">Проверить API</button>
      </div>
      <div id="apiStatus" class="api-status">Готово к проверке.</div>
      <pre id="apiResponse" class="api-response">Нажмите «Проверить API», чтобы получить ответ с /adminka_objects/clarity-insights.php.</pre>
    </section>
  </main>
</div>
<script>
  (function () {
    const checkBtn = document.getElementById('checkApiBtn');
    const numOfDaysSelect = document.getElementById('numOfDaysSelect');
    const apiStatus = document.getElementById('apiStatus');
    const apiResponse = document.getElementById('apiResponse');

    if (!checkBtn || !numOfDaysSelect || !apiStatus || !apiResponse) {
      return;
    }

    const setStatus = (message, isError = false) => {
      apiStatus.textContent = message;
      apiStatus.style.color = isError ? '#fca5a5' : '#9ca3af';
    };

    const renderResponse = (payload) => {
      apiResponse.textContent = JSON.stringify(payload, null, 2);
    };

    checkBtn.addEventListener('click', async () => {
      const numOfDays = Number(numOfDaysSelect.value) || 1;
      const endpoint = `/adminka_objects/clarity-insights.php?numOfDays=${encodeURIComponent(numOfDays)}`;

      checkBtn.disabled = true;
      setStatus(`Запрос: ${endpoint}`);
      apiResponse.textContent = 'Загрузка...';

      try {
        const response = await fetch(endpoint, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        const data = await response.json();
        renderResponse(data);
        setStatus(`HTTP ${response.status} • numOfDays=${numOfDays}`, !response.ok || !data.ok);
      } catch (error) {
        setStatus('Ошибка запроса к API.', true);
        renderResponse({
          ok: false,
          error: 'Fetch failed',
          details: error && error.message ? error.message : String(error),
          endpoint
        });
      } finally {
        checkBtn.disabled = false;
      }
    });
  })();
</script>
</body>
</html>
