<!-- 
  ===============================================
  АЛЬТЕРНАТИВНЫЙ ВАРИАНТ: Если Яндекс.Метрика НЕ переживает перезагрузку
  ===============================================
  
  Если у вас возникают проблемы с тем, что Яндекс.Метрика требует повторной инициализации,
  используйте этот подход:
-->
<script>
    // Проверка текущего статуса куки
    function readCookieConsent() {
        const cookieValue = document.cookie
            .split('; ')
            .find(row => row.startsWith('cookieConsent='))
            ?.split('=')[1];
        
        if (!cookieValue) return null;
        try {
            return JSON.parse(decodeURIComponent(cookieValue));
        } catch (e) {
            return null;
        }
    }
    
    // Проверить статус при загрузке страницы
    const consentData = readCookieConsent();
    
    if (consentData && consentData.analytics) {
        console.log('✅ Analytics разрешена - загружаем GA4, GTM, Яндекс.Метрику');
        // Инициализировать аналитику
        window.__applyCookieConsent();
    } else {
        console.log('⚠️ Analytics не разрешена - ждём согласия пользователя');
    }
</script>
