<section class="team-section" aria-labelledby="team-section-title">
  <div class="team-section__shell">
    <header class="team-section__header">
      <p class="team-section__eyebrow">Наша команда</p>
      <h2 id="team-section-title">Специалисты агентства</h2>
      <p class="team-section__subtitle">Профессионалы, которые сопровождают каждую сделку с точностью, экспертизой и вниманием к деталям.</p>
      <div class="team-section__controls" aria-label="Навигация по слайдам специалистов">
        <button class="team-nav team-nav--prev" type="button" aria-label="Предыдущий слайд специалистов">
          <span aria-hidden="true">←</span>
        </button>
        <button class="team-nav team-nav--next" type="button" aria-label="Следующий слайд специалистов">
          <span aria-hidden="true">→</span>
        </button>
      </div>
    </header>

    <div class="team-section__layout">
      <article class="manager-card" aria-live="polite"></article>

      <div class="agents-slider" tabindex="0" role="region" aria-label="Слайдер специалистов">
        <div class="agents-slider__viewport">
          <div class="agents-slider__track"></div>
        </div>
        <div class="agents-slider__pagination" aria-label="Пагинация слайдов"></div>
      </div>
    </div>
  </div>
</section>

<link rel="stylesheet" href="team-section.css">
<script src="team-section.js" defer></script>
